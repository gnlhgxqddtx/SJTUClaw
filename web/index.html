<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>🐾 DD-SJTUClaw</title>
<style>
  * { box-sizing: border-box; }
  body { margin: 0; font-family: "Segoe UI", "Microsoft YaHei", sans-serif; background: #f4f5f7; color: #222; height: 100vh; display: flex; }
  #sidebar { width: 260px; background: #1f2430; color: #e6e6e6; display: flex; flex-direction: column; flex-shrink: 0; }
  #sidebar h1 { font-size: 16px; padding: 16px; margin: 0; border-bottom: 1px solid #333a4a; }
  #new-session { margin: 10px; padding: 8px; background: #3b82f6; color: #fff; border: none; border-radius: 6px; cursor: pointer; }
  #new-session:hover { background: #2563eb; }
  #session-list { flex: 1; overflow-y: auto; }
  .session-item { padding: 10px 14px; cursor: pointer; border-bottom: 1px solid #2a3040; font-size: 13px; }
  .session-item:hover { background: #2a3040; }
  .session-item.active { background: #313a4e; border-left: 3px solid #3b82f6; }
  .session-item .title { font-weight: 600; }
  .session-item .meta { color: #8a93a6; font-size: 11px; margin-top: 3px; }
  #main { flex: 1; display: flex; flex-direction: column; min-width: 0; }
  #header { padding: 12px 18px; background: #fff; border-bottom: 1px solid #e2e4e8; font-weight: 600; display: flex; justify-content: space-between; align-items: center; }
  #messages { flex: 1; overflow-y: auto; padding: 18px; }
  .msg { margin-bottom: 14px; display: flex; }
  .msg.user { justify-content: flex-end; }
  .bubble { max-width: 72%; padding: 10px 14px; border-radius: 12px; white-space: pre-wrap; word-break: break-word; line-height: 1.5; }
  .user .bubble { background: #3b82f6; color: #fff; border-bottom-right-radius: 3px; }
  .assistant .bubble { background: #fff; border: 1px solid #e2e4e8; border-bottom-left-radius: 3px; }
  .trace { font-size: 12px; color: #6b7280; background: #eef1f5; border-left: 3px solid #b6c0d0; padding: 6px 10px; margin: 4px 0; border-radius: 4px; white-space: pre-wrap; word-break: break-word; font-family: Consolas, monospace; }
  .trace.err { border-left-color: #ef4444; color: #b91c1c; background: #fef2f2; }
  .dl-link { display: inline-block; margin: 4px 0; font-size: 12px; color: #2563eb; text-decoration: none; background: #eff6ff; border: 1px solid #bfdbfe; border-radius: 6px; padding: 4px 10px; }
  .dl-link:hover { background: #dbeafe; }
  .approval-card { border: 1px solid #f0b400; background: #fffbeb; border-radius: 8px; padding: 10px 12px; margin: 8px 0; font-size: 13px; }
  .approval-card .ap-title { font-weight: 600; color: #92600a; }
  .approval-card .ap-args { font-family: Consolas, monospace; font-size: 12px; color: #555; background: #fff; border: 1px solid #f0e2b8; border-radius: 6px; padding: 6px 8px; margin: 6px 0; white-space: pre-wrap; word-break: break-word; }
  .approval-card .ap-reason { width: 100%; padding: 6px; border: 1px solid #e2c98a; border-radius: 6px; font-size: 12px; font-family: inherit; margin-bottom: 6px; }
  .approval-card .ap-actions { display: flex; gap: 8px; }
  .approval-card button { border: none; border-radius: 6px; padding: 5px 14px; cursor: pointer; font-size: 12px; }
  .ap-approve { background: #10b981; color: #fff; } .ap-reject { background: #ef4444; color: #fff; }
  .approval-card.done { opacity: .6; }
  #workspace-bar { padding: 6px 18px; background: #f0f4ff; border-bottom: 1px solid #dbe4ff; font-size: 12px; color: #334; display: flex; align-items: center; gap: 8px; }
  #workspace-bar code { background: #fff; border: 1px solid #cdd8f0; border-radius: 4px; padding: 1px 6px; }
  #ws-set { font-size: 12px; color: #3b82f6; cursor: pointer; background: none; border: 1px solid #cbd2dc; border-radius: 6px; padding: 3px 8px; }
  #composer { border-top: 1px solid #e2e4e8; background: #fff; padding: 12px 18px; }
  #attachments-bar { font-size: 12px; color: #555; margin-bottom: 8px; display: flex; gap: 8px; align-items: center; flex-wrap: wrap; }
  .att-chip { background: #eef1f5; border-radius: 10px; padding: 2px 8px; }
  #input-row { display: flex; gap: 8px; }
  #input { flex: 1; resize: none; padding: 10px; border: 1px solid #cbd2dc; border-radius: 8px; font-size: 14px; font-family: inherit; }
  #send { padding: 0 20px; background: #3b82f6; color: #fff; border: none; border-radius: 8px; cursor: pointer; }
  #send:disabled { background: #9db8e8; cursor: default; }
  #banner { padding: 8px 18px; background: #fff8e1; color: #8a6d00; font-size: 13px; display: none; }
  .tools-btn { font-size: 12px; color: #3b82f6; cursor: pointer; background: none; border: 1px solid #cbd2dc; border-radius: 6px; padding: 4px 8px; }
  /* 定时任务模态 */
  .modal { position: fixed; inset: 0; background: rgba(0,0,0,.4); display: none; align-items: center; justify-content: center; z-index: 10; }
  .modal.open { display: flex; }
  .modal-box { background: #fff; width: 720px; max-width: 94vw; max-height: 88vh; border-radius: 10px; display: flex; flex-direction: column; overflow: hidden; }
  .modal-head { display: flex; justify-content: space-between; align-items: center; padding: 12px 16px; border-bottom: 1px solid #e2e4e8; font-weight: 600; }
  .modal-head button { border: none; background: none; font-size: 20px; cursor: pointer; color: #888; }
  .modal-body { padding: 16px; overflow-y: auto; }
  #task-form { display: grid; gap: 8px; margin-bottom: 16px; padding: 12px; background: #f7f8fa; border-radius: 8px; }
  #task-form label { font-size: 12px; color: #555; display: block; margin-bottom: 2px; }
  #task-form textarea, #task-form select, #task-form input { width: 100%; padding: 7px; border: 1px solid #cbd2dc; border-radius: 6px; font-size: 13px; font-family: inherit; }
  #task-form .row { display: flex; gap: 10px; }
  #task-form .row > div { flex: 1; }
  #task-create { padding: 8px; background: #3b82f6; color: #fff; border: none; border-radius: 6px; cursor: pointer; }
  .task-card { border: 1px solid #e2e4e8; border-radius: 8px; padding: 10px 12px; margin-bottom: 10px; font-size: 13px; }
  .task-card .head { display: flex; justify-content: space-between; align-items: center; gap: 8px; }
  .task-card .content { font-weight: 600; word-break: break-word; }
  .task-card .meta { color: #6b7280; font-size: 12px; margin-top: 4px; line-height: 1.6; }
  .badge { display: inline-block; font-size: 11px; padding: 1px 7px; border-radius: 10px; color: #fff; }
  .badge.pending { background: #f59e0b; } .badge.running { background: #3b82f6; }
  .badge.done { background: #10b981; } .badge.failed { background: #ef4444; } .badge.cancelled { background: #9ca3af; }
  .badge.type { background: #6366f1; }
  .task-cancel { font-size: 12px; color: #ef4444; border: 1px solid #f0b4b4; background: #fff; border-radius: 6px; padding: 3px 8px; cursor: pointer; }
  .task-hist { margin-top: 6px; border-top: 1px dashed #e2e4e8; padding-top: 6px; font-size: 12px; color: #555; max-height: 140px; overflow-y: auto; }
  .task-hist .h { margin: 2px 0; white-space: pre-wrap; word-break: break-word; }
  .task-hist .h.err { color: #b91c1c; }
  /* skill 面板 */
  .skill-card { border: 1px solid #e2e4e8; border-radius: 8px; padding: 10px 12px; margin-bottom: 10px; cursor: pointer; }
  .skill-card:hover { border-color: #6366f1; background: #f5f5ff; }
  .skill-card.sel { border-color: #6366f1; background: #eef0ff; box-shadow: 0 0 0 1px #6366f1 inset; }
  .skill-card .sk-name { font-weight: 600; color: #4338ca; }
  .skill-card .sk-desc { color: #555; font-size: 12px; margin-top: 3px; line-height: 1.5; }
  #skill-run-box { margin-top: 12px; padding: 12px; background: #f7f8fa; border-radius: 8px; }
  #skill-run-box textarea { width: 100%; padding: 7px; border: 1px solid #cbd2dc; border-radius: 6px; font-size: 13px; font-family: inherit; }
  #skill-run { margin-top: 8px; padding: 8px 16px; background: #6366f1; color: #fff; border: none; border-radius: 6px; cursor: pointer; }
  #skill-run:disabled { background: #b5b7e8; cursor: default; }
  .trace.skill { border-left-color: #6366f1; color: #4338ca; background: #eef0ff; }
  #skill-usage-list { margin-top: 14px; border-top: 1px dashed #e2e4e8; padding-top: 10px; }
  #skill-usage-list .u { font-size: 12px; color: #555; margin: 4px 0; }
</style>
</head>
<body>
  <div id="sidebar">
    <h1>🐾 DD-SJTUClaw</h1>
    <button id="new-session">+ 新建会话</button>
    <div id="session-list"></div>
  </div>
  <div id="main">
    <div id="header">
      <span id="header-title">（未选择会话）</span>
      <span>
        <input type="file" id="file-input" style="display:none" />
        <button class="tools-btn" id="skill-btn">🧩 Skills</button>
        <button class="tools-btn" id="task-btn">⏰ 定时任务</button>
        <button class="tools-btn" id="upload-btn">上传附件</button>
      </span>
    </div>
    <div id="workspace-bar">
      <span>🗂️ workspace：</span><code id="ws-value">（未设置）</code>
      <button id="ws-set">设置 / 修改</button>
    </div>
    <div id="banner"></div>
    <div id="messages"></div>
    <div id="composer">
      <div id="attachments-bar"><span>附件：</span><span id="att-list">（无）</span></div>
      <div id="input-row">
        <textarea id="input" rows="2" placeholder="输入消息，Enter 发送，Shift+Enter 换行"></textarea>
        <button id="send">发送</button>
      </div>
    </div>
  </div>
  <div id="task-modal" class="modal">
    <div class="modal-box">
      <div class="modal-head">
        <span>⏰ 定时任务</span>
        <button id="task-close">&times;</button>
      </div>
      <div class="modal-body">
        <form id="task-form">
          <div>
            <label>任务内容（到期后作为用户消息交给 claw）</label>
            <textarea id="task-content" rows="2" placeholder="例如：总结一下今天这个 session 的内容"></textarea>
          </div>
          <div class="row">
            <div>
              <label>所属 session</label>
              <select id="task-session"></select>
            </div>
            <div>
              <label>触发类型</label>
              <select id="task-kind">
                <option value="once">一次性（指定时间点）</option>
                <option value="interval">周期性 · 固定间隔</option>
                <option value="daily">周期性 · 每天固定时间</option>
              </select>
            </div>
          </div>
          <div class="row">
            <div id="field-once">
              <label>触发时间</label>
              <input type="datetime-local" id="task-runat" />
            </div>
            <div id="field-interval" style="display:none">
              <label>间隔（秒）</label>
              <input type="number" id="task-seconds" min="1" value="3600" />
            </div>
            <div id="field-daily" style="display:none">
              <label>每天时间（HH:MM）</label>
              <input type="time" id="task-time" value="22:00" />
            </div>
          </div>
          <button type="submit" id="task-create">创建任务</button>
        </form>
        <div id="task-list"></div>
      </div>
    </div>
  </div>
  <div id="skill-modal" class="modal">
    <div class="modal-box">
      <div class="modal-head">
        <span>🧩 Skills（可复用工作方法）</span>
        <button id="skill-close">&times;</button>
      </div>
      <div class="modal-body">
        <p style="color:#666;font-size:12px;margin-top:0">
          选择一个 skill 并填写任务，claw 会加载它的说明与模板来完成任务（显式调用无需审批）。
          聊天中 claw 也可能自主请求使用 skill，此时会弹出审批卡片。</p>
        <div id="skill-list"></div>
        <div id="skill-run-box">
          <label style="font-size:12px;color:#555">任务内容（将交给所选 skill 完成）</label>
          <textarea id="skill-task" rows="2" placeholder="例如：为《数据结构》课程写一份 2000 字的学习总结报告"></textarea>
          <button id="skill-run" disabled>用所选 skill 执行</button>
          <span id="skill-sel-hint" style="font-size:12px;color:#888;margin-left:8px">（未选择 skill）</span>
        </div>
        <div id="skill-usage-list"></div>
      </div>
    </div>
  </div>
<script>
const state = { currentId: null, workspace: null, shownApprovals: new Set(), selectedSkill: null };
const $ = (id) => document.getElementById(id);

function showBanner(text, isError) {
  const b = $("banner");
  b.textContent = text;
  b.style.display = text ? "block" : "none";
  b.style.background = isError ? "#fef2f2" : "#fff8e1";
  b.style.color = isError ? "#b91c1c" : "#8a6d00";
}

async function api(method, url, body) {
  const opts = { method, headers: {} };
  if (body !== undefined) { opts.headers["Content-Type"] = "application/json"; opts.body = JSON.stringify(body); }
  const res = await fetch(url, opts);
  const data = await res.json().catch(() => ({}));
  if (!res.ok) throw new Error(data.error || ("HTTP " + res.status));
  return data;
}

async function loadSessions() {
  const data = await api("GET", "/api/sessions");
  const list = $("session-list");
  list.innerHTML = "";
  data.sessions.forEach((s) => {
    const div = document.createElement("div");
    div.className = "session-item" + (s.sessionId === state.currentId ? " active" : "");
    div.innerHTML = `<div class="title">${escapeHtml(s.title)}</div>
      <div class="meta">${s.sessionId} · 消息${s.messageCount} · 附件${s.attachmentCount}</div>`;
    div.onclick = () => selectSession(s.sessionId);
    list.appendChild(div);
  });
  if (!state.currentId && data.sessions.length) selectSession(data.sessions[0].sessionId);
}

async function selectSession(sid) {
  state.currentId = sid;
  showBanner("");
  await loadSessions();
  const data = await api("GET", `/api/sessions/${sid}/messages`);
  $("header-title").textContent = `${data.title}（${sid}）`;
  const box = $("messages");
  box.innerHTML = "";
  data.messages.forEach(renderStored);
  scrollBottom();
  await loadAttachments();
  await loadWorkspace();
}

async function loadWorkspace() {
  if (!state.currentId) return;
  try {
    const data = await api("GET", `/api/sessions/${state.currentId}/workspace`);
    state.workspace = data.workspace || null;
  } catch (e) {
    state.workspace = null;
  }
  $("ws-value").textContent = state.workspace || "（未设置）";
}

async function setWorkspace() {
  if (!state.currentId) { showBanner("请先选择会话", true); return; }
  const path = window.prompt("设置 workspace 目录（agent 可操作的项目目录绝对路径）：",
    state.workspace || "");
  if (path === null) return;
  try {
    const data = await api("POST", `/api/sessions/${state.currentId}/workspace`, { path });
    state.workspace = data.workspace;
    $("ws-value").textContent = data.workspace;
    showBanner("workspace 已设置为 " + data.workspace, false);
  } catch (e) {
    showBanner("设置 workspace 失败: " + e.message, true);
  }
}

function renderStored(m) {
  if (m.role === "user") return appendBubble("user", m.content);
  if (m.role === "assistant" && m.kind === "tool_request") return appendTrace("🔧 工具请求: " + m.content, false);
  if (m.role === "assistant" && m.kind === "skill_request") return appendTrace("🧩 skill 请求: " + m.content, false, "skill");
  if (m.role === "assistant") return appendBubble("assistant", m.content);
  if (m.role === "tool") return appendTrace(`↳ [${m.tool || "tool"}] ${m.content}`, false);
}

function appendBubble(role, text) {
  const box = $("messages");
  const wrap = document.createElement("div");
  wrap.className = "msg " + role;
  const b = document.createElement("div");
  b.className = "bubble";
  b.textContent = text;
  wrap.appendChild(b);
  box.appendChild(wrap);
}
function appendTrace(text, isErr, extraClass) {
  const box = $("messages");
  const d = document.createElement("div");
  d.className = "trace" + (isErr ? " err" : "") + (extraClass ? " " + extraClass : "");
  d.textContent = text;
  box.appendChild(d);
}
function scrollBottom() { const b = $("messages"); b.scrollTop = b.scrollHeight; }
function escapeHtml(s) { return (s || "").replace(/[&<>"]/g, (c) => ({ "&": "&amp;", "<": "&lt;", ">": "&gt;", '"': "&quot;" }[c])); }

async function loadAttachments() {
  if (!state.currentId) return;
  const data = await api("GET", `/api/sessions/${state.currentId}/attachments`);
  const el = $("att-list");
  if (!data.attachments.length) { el.textContent = "（无）"; return; }
  el.innerHTML = data.attachments.map((a) =>
    `<span class="att-chip">${escapeHtml(a.filename)} · ${a.size}B</span>`).join(" ");
}

async function sendMessage() {
  const input = $("input");
  const text = input.value.trim();
  if (!text) return;
  if (!state.currentId) { showBanner("请先创建或选择一个会话", true); return; }
  input.value = "";
  await runChat(text, null);
}

async function runChat(text, skillName) {
  if (!state.currentId) { showBanner("请先创建或选择一个会话", true); return; }
  $("send").disabled = true;
  appendBubble("user", text);
  if (skillName) appendTrace(`🧩 使用 skill: ${skillName}（用户指定）`, false, "skill");
  scrollBottom();
  // agent loop 遇到写/命令类 tool 或自主请求使用 skill 时会在服务端阻塞等待审批；
  // 这里在请求进行期间轮询 /api/approvals，把待审批项渲染成审批卡片。
  const poll = setInterval(pollApprovals, 1000);
  try {
    const body = { sessionId: state.currentId, message: text };
    if (skillName) body.skill = skillName;
    const data = await api("POST", "/api/chat", body);
    (data.events || []).forEach((ev) => {
      if (ev.kind === "tool_call") appendTrace(`🔧 调用 ${ev.tool} ${JSON.stringify(ev.args)}`, false);
      else if (ev.kind === "approval_result")
        appendTrace(`🔐 审批 ${ev.tool}：${ev.approved ? "已批准" : "已拒绝"}${ev.reason ? "（" + ev.reason + "）" : ""}`, !ev.approved);
      else if (ev.kind === "tool_result") {
        appendTrace(`↳ [${ev.tool}] (${ev.ok ? "ok" : "error"}) ${ev.ok ? ev.output : ev.error}`, !ev.ok);
        if (ev.ok && ev.extra && ev.extra.downloadUrl)
          appendDownload(ev.extra.downloadUrl, ev.extra.filename || "下载文件");
      }
      else if (ev.kind === "skill")
        appendTrace(`🧩 已加载 skill: ${ev.skill}（${ev.source === "explicit" ? "用户指定" : "模型自主"}${ev.reason ? "，理由: " + ev.reason : ""}）`, false, "skill");
      else if (ev.kind === "skill_result" && !ev.ok)
        appendTrace(`🧩 加载 skill ${ev.skill || ""} 失败: ${ev.error || ""}`, true);
      else if (ev.kind === "final") appendBubble("assistant", ev.content);
      else if (ev.kind === "error") appendTrace("错误: " + ev.message, true);
    });
    if (!data.ok && data.reply === null) showBanner("本轮调用失败，请重试", true);
    await loadSessions();
  } catch (e) {
    showBanner("发送失败: " + e.message, true);
  } finally {
    clearInterval(poll);
    $("send").disabled = false;
    scrollBottom();
  }
}

async function pollApprovals() {
  let data;
  try {
    data = await api("GET", "/api/approvals");
  } catch (e) {
    return;  // 轮询失败静默重试，不打断聊天
  }
  (data.approvals || []).forEach((rec) => {
    if (rec.sessionId !== state.currentId) return;
    if (state.shownApprovals.has(rec.approvalId)) return;
    state.shownApprovals.add(rec.approvalId);
    renderApproval(rec);
  });
}

function renderApproval(rec) {
  const box = $("messages");
  const card = document.createElement("div");
  card.className = "approval-card";
  card.innerHTML = `
    <div class="ap-title">🔐 需要审批：${escapeHtml(rec.tool)}</div>
    <div class="ap-args">${escapeHtml(JSON.stringify(rec.args, null, 2))}</div>
    <input class="ap-reason" placeholder="拒绝原因（可选，会反馈给模型）" />
    <div class="ap-actions">
      <button class="ap-approve">批准执行</button>
      <button class="ap-reject">拒绝</button>
    </div>`;
  const reasonInput = card.querySelector(".ap-reason");
  const finish = (approved) => {
    const reason = reasonInput.value.trim();
    card.querySelectorAll("button").forEach((b) => (b.disabled = true));
    decideApproval(rec.approvalId, approved, reason, card);
  };
  card.querySelector(".ap-approve").onclick = () => finish(true);
  card.querySelector(".ap-reject").onclick = () => finish(false);
  box.appendChild(card);
  scrollBottom();
}

async function decideApproval(approvalId, approved, reason, card) {
  try {
    await api("POST", `/api/approvals/${approvalId}/decide`, { approved, reason });
    card.classList.add("done");
    const tip = document.createElement("div");
    tip.style.marginTop = "6px";
    tip.style.color = approved ? "#065f46" : "#991b1b";
    tip.textContent = approved ? "已批准，继续执行。" : "已拒绝。" + (reason ? "原因：" + reason : "");
    card.appendChild(tip);
  } catch (e) {
    card.querySelectorAll("button").forEach((b) => (b.disabled = false));
    showBanner("提交审批决定失败: " + e.message, true);
  }
}

function appendDownload(url, filename) {
  const box = $("messages");
  const a = document.createElement("a");
  a.className = "dl-link";
  a.href = url;
  a.setAttribute("download", "");
  a.textContent = "⬇ 下载 " + filename;
  box.appendChild(a);
}

$("send").onclick = sendMessage;
$("input").addEventListener("keydown", (e) => {
  if (e.key === "Enter" && !e.shiftKey) { e.preventDefault(); sendMessage(); }
});
$("new-session").onclick = async () => {
  const data = await api("POST", "/api/sessions", { title: "Web 会话" });
  state.currentId = data.sessionId;
  await selectSession(data.sessionId);
};
$("upload-btn").onclick = () => $("file-input").click();
$("ws-set").onclick = () => setWorkspace();
$("file-input").onchange = async (e) => {
  const file = e.target.files[0];
  if (!file || !state.currentId) return;
  const reader = new FileReader();
  reader.onload = async () => {
    const b64 = reader.result.split(",")[1];
    try {
      await api("POST", `/api/sessions/${state.currentId}/attachments`,
        { filename: file.name, type: file.type, dataBase64: b64 });
      await loadAttachments();
      await loadSessions();
      showBanner(`附件已上传: ${file.name}`, false);
    } catch (err) { showBanner("上传失败: " + err.message, true); }
  };
  reader.readAsDataURL(file);
  e.target.value = "";
};

// ---------- 定时任务 ----------
function scheduleText(t) {
  const s = t.schedule || {};
  if (s.kind === "once") return "一次性 @ " + fmtTime(s.runAt);
  if (s.kind === "interval") return `每 ${s.seconds} 秒`;
  if (s.kind === "daily") return `每天 ${s.time}`;
  return JSON.stringify(s);
}
function fmtTime(iso) {
  if (!iso) return "—";
  return String(iso).replace("T", " ").slice(0, 19);
}

async function openTaskModal() {
  // 填充 session 下拉（默认选中当前 session）
  const data = await api("GET", "/api/sessions");
  const sel = $("task-session");
  sel.innerHTML = data.sessions.map((s) =>
    `<option value="${s.sessionId}">${escapeHtml(s.title)} (${s.sessionId})</option>`).join("");
  if (state.currentId) sel.value = state.currentId;
  $("task-modal").classList.add("open");
  await loadTasks();
}
function closeTaskModal() { $("task-modal").classList.remove("open"); }

async function loadTasks() {
  const data = await api("GET", "/api/tasks");
  const box = $("task-list");
  if (!data.tasks.length) { box.innerHTML = "<p style='color:#888'>（暂无定时任务）</p>"; return; }
  box.innerHTML = "";
  data.tasks.slice().reverse().forEach((t) => box.appendChild(renderTask(t)));
}

function renderTask(t) {
  const card = document.createElement("div");
  card.className = "task-card";
  const canCancel = t.status === "pending" || t.status === "running";
  const hist = (t.history || []).slice(-5).reverse().map((h) => {
    const cls = h.ok ? "" : " err";
    const body = h.ok ? (h.reply || "（无回复文本）") : ("失败: " + (h.error || "未知错误"));
    return `<div class="h${cls}">· ${fmtTime(h.ranAt)} ${escapeHtml(body)}</div>`;
  }).join("");
  card.innerHTML = `
    <div class="head">
      <span class="content">${escapeHtml(t.content)}</span>
      <span><span class="badge type">${t.type === "once" ? "一次性" : "周期"}</span>
        <span class="badge ${t.status}">${t.status}</span></span>
    </div>
    <div class="meta">
      规则：${scheduleText(t)} ｜ 下次触发：${fmtTime(t.nextRunAt)}<br/>
      所属 session：${t.sessionId} ｜ ${t.id} ｜ 更新：${fmtTime(t.updatedAt)}
    </div>
    ${hist ? `<div class="task-hist">${hist}</div>` : ""}
  `;
  if (canCancel) {
    const btn = document.createElement("button");
    btn.className = "task-cancel";
    btn.textContent = "取消";
    btn.onclick = async () => {
      try { await api("POST", `/api/tasks/${t.id}/cancel`); await loadTasks(); }
      catch (e) { showBanner("取消失败: " + e.message, true); }
    };
    card.querySelector(".head > span:last-child").appendChild(btn);
  }
  return card;
}

function updateTaskFields() {
  const kind = $("task-kind").value;
  $("field-once").style.display = kind === "once" ? "" : "none";
  $("field-interval").style.display = kind === "interval" ? "" : "none";
  $("field-daily").style.display = kind === "daily" ? "" : "none";
}

$("task-btn").onclick = () => openTaskModal().catch((e) => showBanner("打开任务面板失败: " + e.message, true));
$("task-close").onclick = closeTaskModal;
$("task-modal").addEventListener("click", (e) => { if (e.target.id === "task-modal") closeTaskModal(); });
$("task-kind").onchange = updateTaskFields;
$("task-form").addEventListener("submit", async (e) => {
  e.preventDefault();
  const content = $("task-content").value.trim();
  const sessionId = $("task-session").value;
  const kind = $("task-kind").value;
  let schedule;
  if (kind === "once") schedule = { kind: "once", runAt: $("task-runat").value };
  else if (kind === "interval") schedule = { kind: "interval", seconds: Number($("task-seconds").value) };
  else schedule = { kind: "daily", time: $("task-time").value };
  try {
    await api("POST", "/api/tasks", { content, sessionId, schedule });
    $("task-content").value = "";
    await loadTasks();
    showBanner("任务已创建", false);
  } catch (err) {
    showBanner("创建任务失败: " + err.message, true);
  }
});

// ---------- Skills ----------
async function openSkillModal() {
  if (!state.currentId) { showBanner("请先创建或选择一个会话", true); return; }
  state.selectedSkill = null;
  updateSkillSelHint();
  $("skill-modal").classList.add("open");
  await Promise.all([loadSkills(), loadSkillUsage()]);
}
function closeSkillModal() { $("skill-modal").classList.remove("open"); }

async function loadSkills() {
  const box = $("skill-list");
  try {
    const data = await api("GET", "/api/skills");
    if (!data.skills.length) { box.innerHTML = "<p style='color:#888'>（暂无可用 skill）</p>"; return; }
    box.innerHTML = "";
    data.skills.forEach((s) => box.appendChild(renderSkillCard(s)));
  } catch (e) {
    box.innerHTML = "<p style='color:#b91c1c'>加载 skill 失败: " + escapeHtml(e.message) + "</p>";
  }
}

function renderSkillCard(s) {
  const card = document.createElement("div");
  card.className = "skill-card";
  card.innerHTML = `<div class="sk-name">${escapeHtml(s.name)}</div>
    <div class="sk-desc">${escapeHtml(s.description)}</div>`;
  card.onclick = () => {
    state.selectedSkill = s.name;
    document.querySelectorAll("#skill-list .skill-card").forEach((c) => c.classList.remove("sel"));
    card.classList.add("sel");
    updateSkillSelHint();
  };
  return card;
}

function updateSkillSelHint() {
  $("skill-sel-hint").textContent = state.selectedSkill ? "已选择：" + state.selectedSkill : "（未选择 skill）";
  $("skill-run").disabled = !state.selectedSkill;
}

async function loadSkillUsage() {
  if (!state.currentId) return;
  const box = $("skill-usage-list");
  try {
    const data = await api("GET", `/api/sessions/${state.currentId}/skill-usage`);
    if (!data.usages.length) { box.innerHTML = "<div style='color:#888;font-size:12px'>（本会话暂无 skill 使用记录）</div>"; return; }
    box.innerHTML = "<div style='font-weight:600;font-size:12px;color:#444;margin-bottom:4px'>本会话 skill 使用记录</div>";
    data.usages.slice().reverse().forEach((u) => {
      const d = document.createElement("div");
      d.className = "u";
      const src = u.source === "explicit" ? "用户指定" : "模型自主";
      d.textContent = `${fmtTime(u.usedAt)} · ${u.skill}（${src}）${u.reason ? " 理由: " + u.reason : ""}`;
      box.appendChild(d);
    });
  } catch (e) {
    box.innerHTML = "";
  }
}

async function runSkill() {
  const task = $("skill-task").value.trim();
  if (!state.selectedSkill) { showBanner("请先选择一个 skill", true); return; }
  if (!task) { showBanner("请填写要交给 skill 的任务内容", true); return; }
  const skillName = state.selectedSkill;
  $("skill-task").value = "";
  closeSkillModal();
  await runChat(task, skillName);
}

$("skill-btn").onclick = () => openSkillModal().catch((e) => showBanner("打开 skill 面板失败: " + e.message, true));
$("skill-close").onclick = closeSkillModal;
$("skill-modal").addEventListener("click", (e) => { if (e.target.id === "skill-modal") closeSkillModal(); });
$("skill-run").onclick = () => runSkill().catch((e) => showBanner("执行失败: " + e.message, true));

loadSessions().catch((e) => showBanner("加载会话失败: " + e.message, true));
</script>
